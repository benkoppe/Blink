name: "Create Release"

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Derive version variables
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          BUILD=$(( $(agvtool what-version -terse) + 1 ))
          echo "TAG=$TAG"         >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD=$BUILD"     >> "$GITHUB_ENV"

      - name: XCode Select
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Xcode Version
        run: xcodebuild -version

      - name: Cache SPM packages
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Install Developer ID certificate
        env:
          CERT_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/dev_id.p12
          echo "$CERT_BASE64" | base64 --decode > $CERT_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import "$CERT_PATH" -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Set project version
        run: |
          agvtool new-marketing-version "$VERSION"
          agvtool new-version -all "$BUILD"

      - name: Build Blink.app
        run: |
          xcodebuild \
            -scheme Blink \
            -configuration Release \
            -derivedDataPath build \
            -skipMacroValidation \
            build

      - name: Update built app Info.plist
        run: |
          APP_PATH="build/Build/Products/Release/Blink.app"
          INFO_PLIST="$APP_PATH/Contents/Info.plist"

          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "$INFO_PLIST"

      - name: Codesign Sparkle helpers and app
        run: |
          APP_PATH="build/Build/Products/Release/Blink.app"
          SPARKLE_PATH="$APP_PATH/Contents/Frameworks/Sparkle.framework/Versions/B"
          if [ -d "$SPARKLE_PATH/XPCServices/Installer.xpc" ]; then
            /usr/bin/codesign --force --sign "$CERT_NAME" -o runtime "$SPARKLE_PATH/XPCServices/Installer.xpc"
          fi
          if [ -d "$SPARKLE_PATH/XPCServices/Downloader.xpc" ]; then
            /usr/bin/codesign --force --sign "$CERT_NAME" -o runtime --preserve-metadata=entitlements "$SPARKLE_PATH/XPCServices/Downloader.xpc"
          fi
          if [ -f "$SPARKLE_PATH/Autoupdate" ]; then
            /usr/bin/codesign --force --sign "$CERT_NAME" -o runtime "$SPARKLE_PATH/Autoupdate"
          fi
          if [ -d "$SPARKLE_PATH/Updater.app" ]; then
            /usr/bin/codesign --force --sign "$CERT_NAME" -o runtime "$SPARKLE_PATH/Updater.app"
          fi
          if [ -d "$APP_PATH/Contents/Frameworks/Sparkle.framework" ]; then
            /usr/bin/codesign --force --sign "$CERT_NAME" -o runtime "$APP_PATH/Contents/Frameworks/Sparkle.framework"
          fi
          /usr/bin/codesign --force --sign "$CERT_NAME" -o runtime --entitlements "Blink/Blink.entitlements" "$APP_PATH"

      - name: Verify code signing
        run: |
          codesign --verify --deep --strict --verbose=2 "build/Build/Products/Release/Blink.app"
          spctl --assess --type execute --verbose=4 "build/Build/Products/Release/Blink.app"

      - name: Create DMG
        env:
          CERT_NAME: ${{ secrets.DEVELOPER_ID_P12_NAME }}
        run: |
          npm install --global create-dmg
          create-dmg \
            --identity="$CERT_NAME" \
            /tmp/BlinkExport/Blink.app \
            ./
          mv ./Blink*.dmg ./Blink.dmg

      - name: Notarize DMG
        env:
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
        run: |
          xcrun notarytool submit Blink.dmg \
            --apple-id "$NOTARIZATION_APPLE_ID" \
            --password "$NOTARIZATION_PASSWORD" \
            --team-id "$NOTARIZATION_TEAM_ID" \
            --wait

          echo "Attach staple"
          xcrun stapler staple "Blink.dmg"
          xcrun stapler staple "build/Build/Products/Release/Blink.app"

      - name: Setup Sparkle framework tools
        uses: jozefizso/setup-sparkle@v2

      - name: Set up Sparkle appcast staging
        run: |
          mkdir /tmp/appcast-staging
          git show origin/gh-pages:appcast.xml > /tmp/appcast-staging/appcast.xml
          cp Blink.dmg /tmp/appcast-staging/

      - name: Generate appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          echo "$SPARKLE_PRIVATE_KEY" | \
            generate_appcast \
              --ed-key-file - \
              --download-url-prefix \
                "https://github.com/benkoppe/Blink/releases/download/$TAG/" \
              --link "https://github.com/benkoppe/Blink" \
              /tmp/appcast-staging/

      - name: Inject release notes link
        run: |
          perl -0777 -i -pe \
            's#</item># <sparkle:releaseNotesLink>https://benkoppe.github.io/Blink/ReleaseNotes.md</sparkle:releaseNotesLink>\n </item>#' \
            /tmp/appcast-staging/appcast.xml

      - name: Create GitHub Release
        run: |
          gh release create "$TAG" Blink.dmg \
            --title "Blink $VERSION" \
            --notes-from-tag \
            --verify-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push appcast to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          cp /tmp/appcast-staging/appcast.xml ./appcast.xml
          git add appcast.xml
          git commit -m "Update appcast for $TAG"
          git push origin gh-pages

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $KEYCHAIN_PATH
