name: "Create Release"

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Determinate Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Magic Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Install Nix direnv
        run: nix develop .

      - name: Derive version variables
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          # We inject the "build number" as simply the number of commits since HEAD.
          BUILD=$(git rev-list --count HEAD)
          echo "TAG=$TAG"         >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD=$BUILD"     >> "$GITHUB_ENV"

      - name: Xcode Cache
        uses: irgaly/xcode-cache@v1
        with:
          key: xcode-cache-deriveddata-${{ github.workflow }}-${{ github.sha }}
          restore-keys: xcode-cache-deriveddata-${{ github.workflow }}-

      - name: Install Developer ID certificate
        env:
          CERT_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/dev_id.p12
          echo "$CERT_BASE64" | base64 --decode > $CERT_PATH

          nix develop . --command fastlane cert_keychain path:"$CERT_PATH"

      - name: Build Blink.app
        run: |
          nix develop . --command fastlane ci_build version:"$VERSION" build:"$BUILD"

      - name: Create DMG
        env:
          CERT_NAME: ${{ secrets.DEVELOPER_ID_P12_NAME }}
        run: |
          npm install --global create-dmg
          create-dmg \
            --identity="$CERT_NAME" \
            build/Blink.app \
            ./
          mv ./Blink*.dmg ./Blink.dmg

      - name: Notarize DMG
        env:
          NOTARIZATION_APPLE_ID: ${{ secrets.NOTARIZATION_APPLE_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
        run: |
          xcrun notarytool store-credentials "AC_PROFILE" \
            --apple-id "$NOTARIZATION_APPLE_ID" \
            --team-id "$NOTARIZATION_TEAM_ID" \
            --password "$NOTARIZATION_PASSWORD"
          xcrun notarytool submit Blink.dmg \
            --keychain-profile "AC_PROFILE" \
            --wait

          echo "Attach staple"
          xcrun stapler staple "Blink.dmg"
          xcrun stapler staple "build/Blink.app"

      - name: Verify code signing / notarization
        run: |
          # Verify signature structure
          codesign --verify --deep --strict --verbose=2 "build/Blink.app"
          # Show signing identity (debugging / audit)
          codesign -dv --verbose=4 "build/Blink.app"

          # Gatekeeper check for the app bundle
          spctl --assess --type execute --verbose=4 "build/Blink.app"

          # Verify notarization stapling
          xcrun stapler validate "Blink.dmg"
          xcrun stapler validate "build/Blink.app"

      - name: Setup Sparkle framework tools
        uses: jozefizso/setup-sparkle@v2
        with:
          version: 2.9.1

      - name: Set up Sparkle appcast staging
        run: |
          mkdir /tmp/appcast-staging

          if git ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages exists"

            if git show origin/gh-pages:appcast.xml >/dev/null 2>&1; then
              echo "appcast.xml exists, reusing"
              git show origin/gh-pages:appcast.xml > /tmp/appcast-staging/appcast.xml
            else
              echo "No appcast.xml yet, starting fresh"
            fi
          else
            echo "No gh-pages branch yet, starting fresh"
          fi

          cp Blink.dmg /tmp/appcast-staging/

      - name: Generate appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          echo "$SPARKLE_PRIVATE_KEY" | \
            generate_appcast \
              --ed-key-file - \
              --download-url-prefix \
                "https://github.com/benkoppe/Blink/releases/download/$TAG/" \
              --link "https://github.com/benkoppe/Blink" \
              /tmp/appcast-staging/

      - name: Inject release notes link
        run: |
          perl -0777 -i -pe \
            's#</item># <sparkle:releaseNotesLink>https://benkoppe.github.io/Blink/ReleaseNotes.md</sparkle:releaseNotesLink>\n </item>#' \
            /tmp/appcast-staging/appcast.xml

      - name: Create GitHub Release
        run: |
          gh release create "$TAG" Blink.dmg \
            --title "Blink $VERSION" \
            --notes-from-tag \
            --verify-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keychain
        if: always()
        run: nix develop . --command fastlane delete_cert_keychain

      - name: Push appcast to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git reset --hard
          git clean -fd

          git fetch origin gh-pages
          git checkout gh-pages

          cp /tmp/appcast-staging/appcast.xml ./appcast.xml
          git add appcast.xml
          git commit -m "Update appcast for $TAG"
          git push origin gh-pages
